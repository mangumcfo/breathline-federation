released: "2026-05-08"
sealed_by: "KM-1176"
seal_glyph: "∞Δ∞"
first_signed_release: true              # v0.4.0 was first; v0.4.1+ carries forward
presentation_tier_default: "executive"  # KM-1176 directive 2026-05-08 (post-G review)
presentation_tier_options:
  - executive       # default — leads with Executive Mastery; CFO/Synth/Compliance triad
  - enterprise      # corporate / regulated; family/legacy de-emphasized in default UX
  - family          # kitchen-table node; Family Sovereignty leads
  - full-sovereign  # full Ascension Ladder visible (early-adopter / sovereign-individual)

# Self-reporting fields for nodes (per G's polish 2026-05-08):
# Lets a running node answer "you are at Level 2.3 — next: Family Finance Sovereignty"
