        sha256: "58af6c315b90fce83588a7d4e611d16e4a0d35807509701a11a5b9f17e4a00dc"
        ladder_level: 0
    executive:
      []                              # role specs land at v0.3.0 alongside Series 1 spec extraction
    family:
      - id: "family_constitution_v1"
        path: "specs/family/family_constitution_v1.yaml"
        sha256: "67d6a17706c22defdab11fc8f24d046fc19e72630919e5444b122c566c3b25cc"
        ladder_level: 2
        parent: "base_constitution_v1"
      - id: "family_cfo_agent_v1"
        path: "specs/family/family_cfo_agent_v1.yaml"
        sha256: "693a53a53b0c7cca9b67b9d905ecff55ff27287e9a0c01522528f394375cce71"
        ladder_level: 2
        series: "family"
        book: "Family_Finance_Sovereignty"
