  algorithm:   "ed25519"               # P1 ECC root signing
  public_keys: "distribution/signing_keys/"
  current_key:
    file:        "distribution/signing_keys/release_v1.pub"
    fingerprint: "SHA256:Ahl1MJITIKhLb+WQIwUh/Euo2b0/4oxrIPJZ3QZK9YQ"
    sha256:      "4548aeb40a845df93af64ce02c2e3f44a7cbf0b8ab4a1839b2f59a56a9ca73e3"
    effective:   "2026-05-08"
    authority:   "KM-1176"
  trust_model:   "distribution/signing_keys/README.md"
  signed_artifacts:
    - "manifest.yaml.sig"
    - "CHARTER.md.sig"
    - "CONSTITUTION.md.sig"
    - "LICENSE.sig"
    - "CHANGELOG.md.sig"
  signing_namespace: "breathline-release"
  signature_identity: "breathline-release-signing-key kenn@mangumcfo.com 2026-05-08"
  verification_command: "ssh-keygen -Y verify -f distribution/signing_keys/release_v1.pub -I '<identity>' -n breathline-release -s <FILE>.sig < <FILE>"

