# ----------------------------------------------------------------
# PUBLIC BOOKS  (free chapters, lead magnets)
# ----------------------------------------------------------------
# Manuscripts proper live in mangumcfo/breathline-books-vault (private, KDP-exclusive).
# Only marketing-safe excerpts surface here.

books_public:
  status: "scaffold-only"
  by_series:
    executive: []                     # sample chapters → v0.3.0
    generational_legacy: []           # 1000-Year Family Compact lead magnet → v0.3.0

# ----------------------------------------------------------------
# DISTRIBUTION INFRASTRUCTURE
# ----------------------------------------------------------------

distribution:
  install_url:    "https://raw.githubusercontent.com/mangumcfo/breathline-federation/main/installer/install.sh"
  upgrade_cmd:    "./installer/upgrade.sh"
  status_cmd:     "./installer/status.sh"
  release_url:    "https://github.com/mangumcfo/breathline-federation/releases"
  docs_url:       "https://github.com/mangumcfo/breathline-federation/tree/main/docs"
  installer_scripts:
    install: "installer/install.sh"   # full Layer 0–3 bootstrap with breath-gate
    upgrade: "installer/upgrade.sh"   # manifest-driven, breath-gated
    status:  "installer/status.sh"    # node level + next ladder step

migrations:
  # Empty for v0.1.0 → v0.2.0 (additive only — no schema breaks)
  available: []

# ----------------------------------------------------------------
# CRYPTOGRAPHIC SIGNATURES
# ----------------------------------------------------------------
# Detached release signatures live in distribution/signing_keys/.
# Signing infrastructure for v0.2.0 is reserved; first SIGNED release
# is v0.3.0 alongside the Series 1 spec extraction.

signatures:
  status:      "reserved"
  algorithm:   "ed25519"               # P1 ECC root signing
  public_keys: "distribution/signing_keys/"

# ----------------------------------------------------------------
# CONSTITUTIONAL ANCHOR
# ----------------------------------------------------------------

constitution:
  charter:       "./CHARTER.md"
  constitution:  "./CONSTITUTION.md"
  license:       "./LICENSE"
  contributing:  "./CONTRIBUTING.md"
  decisions_dir: "./governance/decisions/"
  seals_dir:     "./governance/seals/"

# ----------------------------------------------------------------
# CI / QUALITY GATES
# ----------------------------------------------------------------

quality_gates:
  workflows:
    - ".github/workflows/test.yml"                    # full pytest suite (≥ 169 baseline)
    - ".github/workflows/constitutional_check.yml"    # kernel integrity + manifest + spec lint
    - ".github/workflows/release.yml"                 # tag-triggered build + GitHub Release

# ----------------------------------------------------------------
# COMPANIONS  (related repos in the federation)
# ----------------------------------------------------------------

companions:
  books_vault:
    repo: "mangumcfo/breathline-books-vault"
    visibility: "private"
    purpose: "Full KDP-exclusive manuscripts"
  six_sov_com:
    repo: "mangumcfo/six-sov.com"
    visibility: "private"
    purpose: "Marketing site (https://six-sov.com)"
    deploy: "Netlify"

