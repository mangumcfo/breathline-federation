current_series:
  publishing_active: ["executive"]   # series with a v1.0 manuscript live
  publishing_pipeline: ["family", "generational_legacy", "education", "health", "federation"]

# ----------------------------------------------------------------
# PLATFORM CODE  (the runnable substrate)
# ----------------------------------------------------------------

platform:
  status: "active"
  kernel_version: "0.2.0"
  required_python: ">=3.12"
  test_count: 169
  source: "Imported from agentic_platform_seed/v1.0 at 2026-05-08 (clean copy per G's review)"
  layers:
    - "Layer 0 — Seed (constitutional kernel + manifest)"
    - "Layer 1 — Kernel (Spec / Constructor / Critic / Auditor / Governor primitives)"
    - "Layer 2 — Platform (registry, audit_adapter, chain_sentinel, receipt_minter, plug-in interface)"
    - "Layer 3 — Roles (CFO / Synthesis / Compliance + LangGraph wrap)"

