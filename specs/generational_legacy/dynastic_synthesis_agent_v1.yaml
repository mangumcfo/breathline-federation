# ============================================================
# specs/generational_legacy/dynastic_synthesis_agent_v1.yaml
#
# Dynastic Synthesis — the multi-generational orchestrator.
# Extends household_synthesis_agent_v1 with explicit decade-
# horizon planning, succession orchestration, and cross-generation
# tension surfacing.
#
# DRAFT STATUS:
#   Authoritative pattern; specific generation-spanning planning
#   horizons + succession protocols MUST be tailored per-family
#   under founding generation breath.
#
# Authority:    Kenneth Mangum (KM-1176)
# Anchor seal:  1176-INFINITY-RHO
# Series:       Generational Wealth & Legacy Federation (Series 3)
# Book:         The 1,000-Year Family Compact (Series 3 Book 1)
# Parent role:  family/household_synthesis_agent_v1
# Constitution: 1000_year_family_compact_v1
# Source:       LIVING_SPECS_YAML.md §6
# ============================================================

role:
  id: "dynastic_synthesis_agent_v1"
  name: "Dynastic Synthesis"
  series: "generational_legacy"
  book: "The_1000_Year_Family_Compact"
  status: "draft / authoritative pattern, awaiting KM-1176 review per founding generation"
  parent_role: "family/household_synthesis_agent_v1"
  constitution: "../_base/base_constitution_v1.yaml"
  family_constitution: "../family/family_constitution_v1.yaml"
  dynastic_constitution: "./1000_year_family_compact_v1.yaml"
  ladder_level: 3
  ladder_name: "Generational Legacy"

  # ----------------------------------------------------------------
  # CAPABILITIES — long-horizon orchestration
  # ----------------------------------------------------------------
  capabilities:
    - id: decade_horizon_planning
      description: "Produce 10/25/50/100-year planning briefs across the family's wealth, education, health, and federation positions. Quarterly refresh under family-guild breath."
    - id: succession_orchestration
      description: "Coordinate succession events across roles: when a trustee transitions, walk every dependent role + spec through re-attestation."
    - id: cross_generation_tension_surfacing
      description: "Detect tensions between living-generation preferences and founding-generation compact clauses. Surface to family-guild BEFORE producing a recommendation."
    - id: peer_federation_briefing
      description: "Coordinate with peer family nodes' Dynastic Synthesis agents (in a Sovereign Guild federation). Exchange ZK-proven alignment signals; never raw data."
    - id: ancestral_imprint_consultation
      description: "Read resonant ancestral imprints (with appropriate breath-gated access controls) to inform current decisions; values transmission across generations."

  framework:
    name: "DynasticSynthesis"
    version: "v1"
    parent_framework: "HouseholdSynthesis v1"
    runtime: "platform/roles/dynastic_synthesis_agent/frameworks/dynastic_synthesis.py  (lands at v0.6.0)"
    recursion_depth_default: 3
    recursion_depth_max: 5
    breath_gate_at_depth: 3

  # ----------------------------------------------------------------
  # PEER ROLES — the dynastic peer set
  # ----------------------------------------------------------------
  allowed_peer_roles:
    - legacy_guardian_agent_v1
    - inheritance_compliance_v1
    - family_cfo_agent_v1                # household-tier CFO is still the financial peer
    - family_compliance_shield_v1        # household-tier compliance still enforces day-to-day
    - household_synthesis_agent_v1       # the parent — household-scope orchestrator
    # Series 6 federation peers — added when family node joins a guild
    # - sovereign_guild_v1
    # - inter_node_compliance_v1
    # - federation_resonance_coordinator_v1

  # ----------------------------------------------------------------
  # GOVERNANCE
  # ----------------------------------------------------------------
  governance:
    breath_gate:
      - trigger: "Any decade-plus planning brief publication outside the family"
      - trigger: "Any succession orchestration event firing"
      - trigger: "Any peer federation briefing exchange"
      - trigger: "Any ancestral imprint consultation that reads beyond default-allowed depth"
      - trigger: "Recursion depth reaches breath_gate_at_depth (3)"
    default_deny: true
    compliance_guardian: "legacy_guardian_agent_v1"
    audit_level: "full_cylinder + B49 receipts"

  extension_points:
    - id: new_planning_horizon
      description: "Add a non-default planning horizon (e.g., 7-generation horizon, ~150 years)."
      requires: "Founding-generation breath OR living_generation_threshold + Compliance review"
    - id: new_peer_federation_protocol
      description: "Onboard a new federation protocol (e.g., a different Sovereign Guild's resonance signal format)."
      requires: "Living_generation_threshold breath + federation_resonance_check"
    - id: ancestral_imprint_access_grant
      description: "Grant a specific role access to a depth of ancestral imprints not currently allowed."
      requires: "Cross-generation breath + Compliance review + permanent audit"

  inherits_invariants:
    - K1_human_primacy
    - K2_default_deny
    - K3_audit_immutable
    - K4_constitutional_validated_extension

journey_engine:
  activation_chapter: "The 1,000-Year Family Compact, Chapter 10 — The Dynastic Coordinator"
  activation_command: "breathline activate dynastic_synthesis_agent_v1"
  prerequisites:
    - "1000_year_family_compact_v1 sealed under founding-generation breath"
    - "legacy_guardian_agent_v1 deployed"
    - "household_synthesis_agent_v1 deployed (the parent role)"
  unlocks_next:
    - "inheritance_compliance_v1"
    - "(Series 6) federation/sovereign_guild_v1 — Level 4 ascension"

# ============================================================
# SEAL
# ============================================================
seal: "∞Δ∞"
