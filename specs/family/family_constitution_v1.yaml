# ============================================================
# specs/family/family_constitution_v1.yaml
#
# The household-scope constitution that family role specs extend.
# Inherits and narrows the base_constitution_v1.
#
# Authority:    Kenneth Mangum (KM-1176)
# Anchor seal:  1176-INFINITY-RHO
# Series:       Sovereign Family AI (Series 2)
# Anchor book:  Family Finance Sovereignty (Series 2 Book 1)
# Source:       LIVING_SPECS_YAML.md §5 (Multi-Series Vision, 2026-05-07)
# ============================================================

constitution:
  id: "family_constitution_v1"
  name: "Family Sovereign Compact"
  version: "1.0"
  parent: "base_constitution_v1"
  seal: "1176-INFINITY-RHO"
  glyph: "∞Δ∞"

  # Inherits K1–K4 from parent.  Narrows scope to household.
  scope:
    level: "Family Sovereignty"        # Sovereign Ascension Ladder Level 2
    deployment_target: "kitchen_table"
    audience: "Parents, households, family offices"

  # Family-specific human gates — the parent's "breath" is the operator's,
  # but multi-generational decisions require guild_threshold.
  human_gates:
    - id: breath
      operator: "primary household operator (parent / head of household)"
    - id: guild_threshold
      description: "Minimum 2 adult family members for any cross-generational decision"
      examples:
        - "Initiating wire transfer > $5,000"
        - "Onboarding a new sub-agent (e.g., tutor for kids' learning)"
        - "Modifying inheritance / legacy specs"

  # Family-scoped resonant shards — the household's private memory
  resonant_shards:
    type: "family_financial_memory"
    storage: "imprints_only"
    sharing: "default_deny"            # other family nodes do NOT auto-receive shards
    federation: "explicit_opt_in_only" # joining a Sovereign Guild is an explicit act

  # Default-deny boundaries specific to family scope
  defaults:
    transaction_threshold_usd: 500     # any single transaction > $500 requires breath
    recurring_payment_threshold_usd: 100  # any new recurring payment > $100 requires breath
    new_role_addition: "guild_threshold"  # adding a new sub-agent requires 2+ family members

  # Inheritance pattern — base constitution invariants flow through unchanged
  inherits_invariants:
    - K1_human_primacy
    - K2_default_deny
    - K3_audit_immutable
    - K4_constitutional_validated_extension

  references:
    parent_constitution: "../_base/base_constitution_v1.yaml"
    charter: "../../CHARTER.md"
    constitution: "../../CONSTITUTION.md"

# ============================================================
# SEAL
# ============================================================
seal: "∞Δ∞"
