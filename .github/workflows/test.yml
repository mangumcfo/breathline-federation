name: Platform Tests

on:
  push:
    branches: [main]
    paths:
      - 'platform/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'platform/**'

# Per Constitutional Source-Available License v1.0:
# - K1 Human Primacy + K2 Default-Deny + K3 Audit-Immutable +
#   K4 Constitutional-Validated Extension are runtime invariants.
# - The CI test suite enforces them at the structural level.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('platform/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install platform with dev extras
        working-directory: platform
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: platform
        run: |
          python -m pytest -v --tb=short

      - name: Test count gate (must be ≥ 169 — v0.2.0 baseline)
        working-directory: platform
        run: |
          count=$(python -m pytest --collect-only -q 2>&1 | grep -E '^[0-9]+ tests?' | awk '{print $1}')
          if [ -z "$count" ]; then count=0; fi
          echo "test count: $count"
          if [ "$count" -lt 169 ]; then
            echo "::error::Test count regressed below v0.2.0 baseline of 169 (got $count)"
            exit 1
          fi
